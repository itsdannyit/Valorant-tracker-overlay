<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Pro Stacked Overlay</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, Roboto, sans-serif;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }

        /* Premium eSports Stacked Widget Design */
        .overlay-widget {
            display: inline-flex;
            flex-direction: column;
            background: rgba(10, 14, 23, 0.88); /* Matte dark backdrop */
            padding: 12px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.6);
            gap: 10px;
            text-transform: uppercase;
        }

        /* TIER 1: Prominent Upper Rank Section */
        .rank-tier {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 1.2px;
            padding-bottom: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* TIER 2: Lower Metadata Row */
        .stats-tier {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.6px;
        }

        .label {
            color: #64748b; /* Steel slate indicator color */
            font-size: 10px;
            font-weight: 900;
            margin-right: 4px;
        }

        .value {
            color: #f8fafc;
        }

        /* Subtle vertical layout ticks */
        .separator {
            width: 2px;
            height: 12px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 1px;
        }

        /* Dynamic Valorant Tier Palette Structure */
        .rank-iron { color: #a1a1aa !important; text-shadow: 0 0 8px rgba(161, 161, 170, 0.4); }
        .rank-bronze { color: #cd7f32 !important; text-shadow: 0 0 8px rgba(205, 127, 50, 0.4); }
        .rank-silver { color: #cbd5e1 !important; text-shadow: 0 0 8px rgba(203, 213, 225, 0.4); }
        .rank-gold { color: #eab308 !important; text-shadow: 0 0 10px rgba(234, 179, 8, 0.5); }
        .rank-platinum { color: #22d3ee !important; text-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }
        .rank-diamond { color: #c084fc !important; text-shadow: 0 0 10px rgba(192, 132, 252, 0.5); }
        .rank-ascendant { color: #22c55e !important; text-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
        .rank-immortal { color: #f43f5e !important; text-shadow: 0 0 12px rgba(244, 63, 94, 0.6); }
        .rank-radiant { color: #f97316 !important; text-shadow: 0 0 14px rgba(249, 115, 22, 0.7); }
        .rank-default { color: #38bdf8; }

        /* Session Delta Colors */
        .delta-plus { color: #00ff66 !important; text-shadow: 0 0 8px rgba(0, 255, 102, 0.2); }
        .delta-minus { color: #ff3333 !important; text-shadow: 0 0 8px rgba(255, 51, 51, 0.2); }
        .delta-zero { color: #94a3b8; }

        /* Isolated Tech Section Pill for Party Code */
        .code-pill {
            font-family: monospace;
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid rgba(56, 189, 248, 0.25);
            padding: 1px 5px;
            border-radius: 4px;
            color: #38bdf8;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div class="overlay-widget" id="widgetContainer">
        <!-- TIER 1: HIGHER LEVEL (RANK FOCUS) -->
        <div class="rank-tier">
            <span id="rankVal" class="rank-default">FETCHING...</span>
        </div>
        
        <!-- TIER 2: LOWER LEVEL (STATS & SECTIONS) -->
        <div class="stats-tier">
            <!-- DELTA SECTION -->
            <div>
                <span class="label">DELTA</span>
                <span id="deltaVal" class="value delta-zero">--</span>
            </div>
            
            <div class="separator"></div>
            
            <!-- WINRATE / RECORD SECTION -->
            <div>
                <span class="label">RECORD</span>
                <span id="wlVal" class="value">0W - 0L</span>
            </div>

            <!-- PARTY CODE SECTION (Appears automatically when set) -->
            <div id="partySection" style="display: none; align-items: center; gap: 12px;">
                <div class="separator"></div>
                <div>
                    <span class="label">PARTY</span>
                    <span id="partyVal" class="code-pill">--</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        const rankVal = document.getElementById('rankVal');
        const deltaVal = document.getElementById('deltaVal');
        const wlVal = document.getElementById('wlVal');
        const partyVal = document.getElementById('partyVal');
        const partySection = document.getElementById('partySection');

        function assignRankThemeColor(rankStr) {
            if (!rankStr) return 'rank-default';
            const normalized = rankStr.toLowerCase();
            
            if (normalized.includes('iron')) return 'rank-iron';
            if (normalized.includes('bronze')) return 'rank-bronze';
            if (normalized.includes('silver')) return 'rank-silver';
            if (normalized.includes('gold')) return 'rank-gold';
            if (normalized.includes('platinum')) return 'rank-platinum';
            if (normalized.includes('diamond')) return 'rank-diamond';
            if (normalized.includes('ascendant')) return 'rank-ascendant';
            if (normalized.includes('immortal')) return 'rank-immortal';
            if (normalized.includes('radiant')) return 'rank-radiant';
            
            return 'rank-default';
        }

        function runOverlaySyncLoop() {
            ws = new WebSocket('ws://localhost:3044');

            ws.onmessage = (event) => {
                try {
                    const packet = JSON.parse(event.data);
                    if (packet.event === 'STATE_UPDATE') {
                        const state = packet.data;

                        // 1. Update Rank at the higher tier level
                        rankVal.innerText = state.rank || "NOT SETUP";
                        rankVal.className = assignRankThemeColor(state.rank);

                        // 2. Update RR Delta section below
                        if (state.rrChange === 0) {
                            deltaVal.innerText = "0 RR";
                            deltaVal.className = "value delta-zero";
                        } else {
                            const prefix = state.rrChange > 0 ? "+" : "";
                            deltaVal.innerText = `${prefix}${state.rrChange} RR`;
                            deltaVal.className = `value ${state.rrChange > 0 ? 'delta-plus' : 'delta-minus'}`;
                        }

                        // 3. Update Match History Session values
                        wlVal.innerText = `${state.wins}W - ${state.losses}L`;

                        // 4. Manage dedicated Party Code segment visibility
                        if (state.partyCode && state.partyCode.trim() !== "") {
                            partyVal.innerText = state.partyCode;
                            partySection.style.display = "flex";
                        } else {
                            partySection.style.display = "none";
                        }
                    }
                } catch (err) {
                    console.error("Overlay stack parse failure:", err);
                }
            };

            ws.onclose = () => {
                rankVal.innerText = "OFFLINE";
                rankVal.className = "delta-minus";
                setTimeout(runOverlaySyncLoop, 3000);
            };

            ws.onerror = () => ws.close();
        }

        runOverlaySyncLoop();
    </script>
</body>
</html>
